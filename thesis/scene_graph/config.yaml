# Minimum horizontal intersection-over-minimum required for above/below/on relations
spatial_graph:
  vertical_iom: 0.5
  near_thres: 0.01
  on_thres: 0.01
  under_thres: 0.01
  relations:
    above: True
    below: True
    near: True
  
fusion:
  distance_threshold: 1.5
  semantic_threshold: 0.81
  coverage_threshold: 0.5
  point_distance_threshold: 0.1
  strong_semantic_threshold: 0.9
  weak_coverage_threshold: 0.2

top_k_views: 10
persistence_threshold: 7
min_segment_points: 5
